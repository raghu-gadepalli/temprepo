{% extends "base.html" %}
{% block title %}Admin - AutoTrades{% endblock %}

{% block content %}
<div class="py-3">

  <!-- Header -->
  <div class="alert alert-warning text-center mb-4">
    <h1 class="h3 mb-2">Admin Panel</h1>
    <p class="mb-0">System tools, controls & diagnostics</p>
  </div>

  <div class="row g-3">

    <!-- Users -->
    <div class="col-6 col-md-4 col-lg-3">
      <a class="text-decoration-none" href="{{ url_for('admin.admin_users') }}">
        <div class="card h-100 shadow-sm">
          <div class="card-body text-center">
            <i class="bi bi-people display-6 d-block mb-2"></i>
            <h2 class="h6 mb-1">Users</h2>
            <p class="text-muted small mb-0">Manage users & access</p>
          </div>
        </div>
      </a>
    </div>

    <!-- System -->
    <div class="col-6 col-md-4 col-lg-3">
      <a class="text-decoration-none" href="{{ url_for('admin.admin_system') }}">
        <div class="card h-100 shadow-sm">
          <div class="card-body text-center">
            <i class="bi bi-cpu display-6 d-block mb-2"></i>
            <h2 class="h6 mb-1">System</h2>
            <p class="text-muted small mb-0">Health, config & logs</p>
          </div>
        </div>
      </a>
    </div>

    <!-- Snapshot Tool -->
    <div class="col-6 col-md-4 col-lg-3">
      <a class="text-decoration-none" href="{{ url_for('admin.admin_snapshot') }}">
        <div class="card h-100 shadow-sm">
          <div class="card-body text-center">
            <i class="bi bi-camera display-6 d-block mb-2"></i>
            <h2 class="h6 mb-1">Snapshot</h2>
            <p class="text-muted small mb-0">Manual data inspection</p>
          </div>
        </div>
      </a>
    </div>

    <!-- Webhook -->
    <div class="col-6 col-md-4 col-lg-3">
      <a class="text-decoration-none" href="#">
        <div class="card h-100 shadow-sm">
          <div class="card-body text-center">
            <i class="bi bi-link-45deg display-6 d-block mb-2"></i>
            <h2 class="h6 mb-1">Webhook</h2>
            <p class="text-muted small mb-0">Incoming integrations</p>
          </div>
        </div>
      </a>
    </div>

  </div>
</div>
{% endblock %}
