{% extends "oms_base.html" %}

{% block oms_content %}

<div class="border-bottom pb-2 mb-2">
    <div class="d-flex justify-content-between align-items-end flex-wrap gap-3">
        <div>
            <h4 class="mb-1">Broker Orders</h4>
            <div class="text-muted small">Latest OMS orders grouped by client</div>
        </div>

        <div class="d-flex align-items-center gap-2 flex-wrap">
            <input
                id="oms-orders-search"
                type="search"
                class="form-control form-control-sm"
                placeholder="Search orders..."
                style="width: 220px;"
            >

            <button id="oms-orders-refresh" class="btn btn-sm btn-outline-primary" type="button">
                Refresh
            </button>
        </div>
    </div>
</div>

<div id="oms-orders-alert" class="alert alert-danger d-none" role="alert"></div>

<div class="card p-2">
    <div id="oms-orders-container"></div>
</div>

{% endblock %}

{% block page_scripts %}
{{ super() }}

<script>
    window.OMS_ORDERS_CONFIG = {
        dataUrl: "{{ url_for('oms.oms_orders_data') }}",
        cancelUrl: "{{ url_for('oms.cancel_order') }}",
        refreshMs: 30000
    };
</script>

<script src="{{ url_for('static', filename='js/oms_orders.js') }}"></script>

{% endblock %}
